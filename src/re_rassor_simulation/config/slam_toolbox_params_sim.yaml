slam_toolbox:
  ros__parameters:
    use_sim_time: true
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_topic: /scan_filtered
    mode: mapping
    map_update_interval: 5.0
    resolution: 0.05
    minimum_travel_distance: 0.1
    minimum_travel_heading: 0.1
    map_start_at_dock: false
    # Allow up to 1s TF timestamp lag — prevents "message earlier than TF cache"
    # drops caused by sim-time skew between depth image stamps and TF cache.
    transform_timeout: 1.0
    tf_buffer_duration: 30.0